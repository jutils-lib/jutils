name: Build jUtils

on:
  push:
    branches:
      - main
    paths:
      - "core.js"
      - "dom.js"
      - "anim.js"
      - "util.js"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Terser
        run: npm install -g terser

      - name: Check source files
        run: |
          test -f core.js
          test -f dom.js
          test -f anim.js
          test -f util.js

      - name: Build jutils.js
        run: |
          cat core.js dom.js anim.js util.js > jutils.js

      - name: Build jutils.min.js
        run: |
          terser jutils.js \
            --compress \
            --mangle \
            --output jutils.min.js

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add jutils.js jutils.min.js

          git diff --cached --quiet && exit 0

          git commit -m "Build jUtils [skip ci]"
          git push
